<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" filter="url(#shadow)"/>

  <!-- Code Brackets -->
  <g transform="translate(50, 60)" stroke="white" stroke-width="3" fill="none" stroke-linecap="round">
    <!-- Left bracket -->
    <path d="M 15 5 L 5 15 L 5 35 L 15 45"/>
    <!-- Right bracket -->
    <path d="M 35 5 L 45 15 L 45 35 L 35 45" transform="translate(20, 0)"/>
  </g>

  <!-- Graduation Cap -->
  <g transform="translate(75, 95)" fill="white">
    <!-- Cap -->
    <path d="M 15 0 L 0 8 L 0 12 L 30 12 L 30 8 Z"/>
    <!-- Visor -->
    <rect x="-5" y="8" width="40" height="2"/>
    <!-- Tassel -->
    <line x1="15" y1="12" x2="15" y2="20" stroke="white" stroke-width="2"/>
    <circle cx="15" cy="22" r="2" fill="white"/>
  </g>

  <!-- Text -->
  <text x="100" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">IT BUSINESS</text>
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.9)">SCHOOL</text>
</svg>
